<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open RC Crew Chief</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --racing-red: #E10600;
            --racing-yellow: #FFD700;
            --carbon-black: #0A0A0A;
            --carbon-dark: #141414;
            --carbon-med: #1E1E1E;
            --steel-gray: #2D2D2D;
            --neon-green: #00FF41;
            --neon-blue: #00D4FF;
            --white: #FFFFFF;
            --off-white: #E8E8E8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, var(--carbon-black) 0%, var(--carbon-dark) 50%, var(--carbon-black) 100%);
            color: var(--off-white);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.01) 2px,
                    rgba(255, 255, 255, 0.01) 4px
                );
            pointer-events: none;
            z-index: 1;
        }
        
        .app-container {
            position: relative;
            z-index: 2;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: linear-gradient(90deg, var(--carbon-med) 0%, var(--steel-gray) 100%);
            border-left: 4px solid var(--racing-red);
            box-shadow: 0 4px 20px rgba(225, 6, 0, 0.3);
            animation: slideIn 0.6s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--racing-red) 0%, var(--racing-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(225, 6, 0, 0.5);
        }
        
        .connect-button {
            font-family: 'Orbitron', sans-serif;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: var(--racing-red);
            color: var(--white);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(225, 6, 0, 0.4);
        }
        
        .connect-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .connect-button:hover::before {
            left: 100%;
        }
        
        .connect-button:hover {
            background: #FF1500;
            box-shadow: 0 0 30px rgba(225, 6, 0, 0.6);
            transform: translateY(-2px);
        }
        
        .connect-button:disabled {
            background: var(--steel-gray);
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.connected {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }
        
        .status-indicator.disconnected {
            background: var(--steel-gray);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .telemetry-card {
            background: var(--carbon-med);
            border: 1px solid var(--steel-gray);
            padding: 20px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .telemetry-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--racing-red), var(--racing-yellow), var(--racing-red));
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: var(--racing-yellow);
        }
        
        .acceleration-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle, var(--carbon-dark) 0%, var(--carbon-black) 100%);
            border: 2px solid var(--steel-gray);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .acceleration-grid {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
        }
        
        .acceleration-grid-line {
            position: absolute;
            background: rgba(255, 215, 0, 0.15);
        }
        
        .acceleration-grid-line.vertical {
            width: 1px;
            height: 100%;
            top: 0;
        }
        
        .acceleration-grid-line.horizontal {
            height: 1px;
            width: 100%;
            left: 0;
        }
        
        .acceleration-grid-line.center {
            background: rgba(255, 215, 0, 0.3);
        }
        
        .acceleration-grid::before,
        .acceleration-grid::after {
            content: '';
            position: absolute;
            background: rgba(255, 215, 0, 0.2);
        }
        
        .acceleration-grid::before {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
        }
        
        .acceleration-grid::after {
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
        }
        
        .acceleration-label {
            position: absolute;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--racing-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .acceleration-label.forward {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .acceleration-label.back {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .acceleration-label.left {
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .acceleration-label.right {
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .acceleration-value-label {
            position: absolute;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            color: rgba(255, 215, 0, 0.6);
        }
        
        .max-speed-indicator {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--neon-blue);
            text-align: center;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        
        .max-speed-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--racing-yellow);
            margin-left: 8px;
        }
        
        .temperature-indicators {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .temp-indicator {
            background: linear-gradient(135deg, var(--carbon-dark) 0%, var(--steel-gray) 100%);
            padding: 12px 15px;
            border-left: 3px solid var(--neon-blue);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .temp-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--racing-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .temp-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon-green);
            line-height: 1;
        }
        
        .temp-conversion {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--neon-blue);
        }
        
        .acceleration-dot {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, var(--racing-red), var(--racing-yellow));
            border-radius: 50%;
            box-shadow: 0 0 20px var(--racing-red), 0 0 40px rgba(225, 6, 0, 0.5);
            transition: all 0.1s ease-out;
            z-index: 10;
        }
        
        .speedometer {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .speed-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--neon-green) 0%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
            animation: speedPulse 0.5s ease-out;
        }
        
        @keyframes speedPulse {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .speed-unit {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--racing-yellow);
            letter-spacing: 3px;
            margin-top: 10px;
        }
        
        /* Leaflet map styling */
        .leaflet-container {
            background: var(--carbon-dark);
        }
        
        .leaflet-control-attribution {
            background: rgba(20, 20, 20, 0.8) !important;
            color: var(--off-white) !important;
        }
        
        .leaflet-control-attribution a {
            color: var(--racing-yellow) !important;
        }
        
        .lap-times-section {
            margin-bottom: 20px;
        }
        
        .lap-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .lap-card {
            background: linear-gradient(135deg, var(--carbon-med) 0%, var(--steel-gray) 100%);
            border-left: 4px solid var(--neon-green);
            padding: 20px;
            position: relative;
            overflow: hidden;
            animation: slideInCard 0.4s ease-out;
        }
        
        @keyframes slideInCard {
            from {
                transform: translateX(-50px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .lap-card.fastest {
            border-left-color: var(--racing-yellow);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .lap-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--racing-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .lap-time {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-green);
        }
        
        .lap-delta {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            margin-top: 5px;
            font-weight: 600;
        }
        
        .lap-delta.positive {
            color: var(--racing-red);
        }
        
        .lap-delta.negative {
            color: var(--neon-green);
        }
        
        .map-section {
            background: var(--carbon-med);
            border: 1px solid var(--steel-gray);
            padding: 20px;
            position: relative;
            animation: fadeIn 1s ease-out;
        }
        
        .map-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green), var(--neon-blue));
        }
        
        #positionMap {
            width: 100%;
            min-height: 500px;
            background: var(--carbon-dark);
        }
        
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--steel-gray);
            font-size: 1.2rem;
            font-style: italic;
        }
        
        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .speed-display {
                font-size: 4rem;
            }
        }

        /* ── Log Analyzer ─────────────────────────────────────────── */

            margin-top: 40px;
            border-top: 2px solid var(--racing-red);
            padding-top: 30px;
        }

        .log-analyzer-header {
            display: flex;

            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;

        .log-analyzer-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .log-upload-btn {
            font-family: 'Orbitron', sans-serif;
            padding: 10px 24px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;

            color: var(--neon-blue);

        .log-upload-btn:hover {

        .log-file-info {

        }

        .log-stats-bar {

            background: var(--carbon-med);

        .log-stat {
            display: flex;

        }

        .log-stat-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;

            color: var(--racing-yellow);

        .log-stat-value {

        .plot-tabs {

        .plot-tab {

            font-size: 0.7rem;

        .time-range-btn:hover {

            color: var(--carbon-black);

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function OpenRCCrewChief() {
            const [connected, setConnected] = useState(false);
            const [disconnecting, setDisconnecting] = useState(false);
            const [acceleration, setAcceleration] = useState({ x: 0, y: 0 });
            const [speed, setSpeed] = useState(0);
            const [maxSpeed, setMaxSpeed] = useState(0);
            const [temp1, setTemp1] = useState(0);
            const [temp2, setTemp2] = useState(0);
            const [laps, setLaps] = useState([]);
            const [positionData, setPositionData] = useState([]);
            
            const portRef = useRef(null);
            const readerRef = useRef(null);
            const mapRef = useRef(null);
            const polylineRef = useRef(null);

            // Web Serial connection
            const connectToRadio = async () => {
                try {
                    // Request a port and open a connection
                    const port = await navigator.serial.requestPort();
                    await port.open({ baudRate: 115200 });
                    
                    portRef.current = port;
                    setConnected(true);
                    
                    // Start reading data
                    readSerialData(port);
                } catch (error) {
                    console.error('Error connecting to Radio:', error);
                    alert('Failed to connect to Radio. Make sure your browser supports Web Serial API.');
                }
            };

            const readSerialData = async (port) => {
                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();
                readerRef.current = reader;

                let buffer = '';

                try {
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        
                        buffer += value;
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // Keep incomplete line in buffer
                        
                        for (const line of lines) {
                            if (line.trim()) {
                                parseSerialData(line.trim());
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error reading serial data:', error);
                }
                // Don't call releaseLock here - let disconnect handle it
            };

            // Parse incoming serial data
            // Expected format examples:
            // ACC:x,y (e.g., "ACC:0.5,-0.3")
            // SPEED:value (e.g., "SPEED:45.2")
            // LAP:time (e.g., "LAP:62.345")
            // POS:lat,lon (e.g., "POS:37.7749,-122.4194")
            // TEMP1:value (e.g., "TEMP1:85.5")
            // TEMP2:value (e.g., "TEMP2:92.3")
            const parseSerialData = (data) => {
                try {
                    if (data.startsWith('ACC:')) {
                        const values = data.substring(4).split(',');
                        const x = parseFloat(values[0]);
                        const y = parseFloat(values[1]);
                        setAcceleration({ x, y });
                    } else if (data.startsWith('SPEED:')) {
                        const speedValue = parseFloat(data.substring(6));
                        setSpeed(speedValue);
                        setMaxSpeed(prev => Math.max(prev, speedValue));
                    } else if (data.startsWith('LAP:')) {
                        const lapTime = parseFloat(data.substring(4));
                        setLaps(prev => [...prev, { 
                            number: prev.length + 1, 
                            time: lapTime,
                            timestamp: Date.now()
                        }]);
                    } else if (data.startsWith('POS:')) {
                        const values = data.substring(4).split(',');
                        const lat = parseFloat(values[0]);
                        const lon = parseFloat(values[1]);
                        setPositionData(prev => [...prev, { lat, lon, timestamp: Date.now() }]);
                    } else if (data.startsWith('TEMP1:')) {
                        const tempValue = parseFloat(data.substring(6));
                        setTemp1(tempValue);
                    } else if (data.startsWith('TEMP2:')) {
                        const tempValue = parseFloat(data.substring(6));
                        setTemp2(tempValue);
                    }
                } catch (error) {
                    console.error('Error parsing data:', error);
                }
            };

            // Disconnect
            const disconnect = async () => {
                setDisconnecting(true);
                try {
                    // First, cancel and release the reader
                    if (readerRef.current) {
                        try {
                            await readerRef.current.cancel();
                            readerRef.current.releaseLock();
                        } catch (e) {
                            console.log('Reader cancel error (this is often normal):', e);
                        }
                        readerRef.current = null;
                    }
                    
                    // Small delay to ensure stream is fully released
                    await new Promise(resolve => setTimeout(resolve, 100));
                    
                    // Then close the port
                    if (portRef.current) {
                        try {
                            await portRef.current.close();
                        } catch (e) {
                            console.error('Port close error:', e);
                        }
                        portRef.current = null;
                    }
                    
                    console.log('Disconnected successfully');
                } catch (error) {
                    console.error('Error during disconnect:', error);
                } finally {
                    // Always set connected to false, even if there was an error
                    setConnected(false);
                    setDisconnecting(false);
                }
            };

            // Initialize and update position map
            useEffect(() => {
                if (positionData.length > 0) {
                    updateMap();
                }
            }, [positionData]);

            const updateMap = () => {
                if (positionData.length === 0) return;

                // Initialize map only once
                if (!mapRef.current) {
                    const firstPoint = positionData[0];
                    const map = L.map('positionMap').setView([firstPoint.lat, firstPoint.lon], 16);
                    
                    // Add OpenStreetMap tiles
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors',
                        maxZoom: 19
                    }).addTo(map);
                    
                    mapRef.current = map;
                    
                    // Create initial polyline
                    const coordinates = positionData.map(p => [p.lat, p.lon]);
                    const polyline = L.polyline(coordinates, {
                        color: '#00FF41',
                        weight: 3,
                        opacity: 0.8
                    }).addTo(map);
                    
                    polylineRef.current = polyline;
                    
                    // Add marker for current position
                    const currentMarker = L.circleMarker([firstPoint.lat, firstPoint.lon], {
                        radius: 6,
                        fillColor: '#E10600',
                        color: '#FFD700',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.9
                    }).addTo(map);
                    
                    polylineRef.currentMarker = currentMarker;
                } else {
                    // Update existing polyline with new coordinates
                    const coordinates = positionData.map(p => [p.lat, p.lon]);
                    polylineRef.current.setLatLngs(coordinates);
                    
                    // Update current position marker
                    const lastPoint = positionData[positionData.length - 1];
                    polylineRef.currentMarker.setLatLng([lastPoint.lat, lastPoint.lon]);
                }
            };

            // Calculate fastest lap
            const fastestLap = laps.length > 0 
                ? Math.min(...laps.map(l => l.time))
                : null;

            return (
                <div className="app-container">
                    <header className="header">
                        <h1>Open RC Crew Chief</h1>
                        <button 
                            className="connect-button"
                            onClick={connected ? disconnect : connectToRadio}
                            disabled={!('serial' in navigator) || disconnecting}
                        >
                            {disconnecting ? 'Disconnecting...' : (connected ? 'Disconnect' : 'Connect Radio')}
                            <span className={`status-indicator ${connected ? 'connected' : 'disconnected'}`}></span>
                        </button>
                    </header>

                    <div className="dashboard-grid">
                        {/* Acceleration Display */}
                        <div className="telemetry-card">
                            <div className="card-title">G-Force Monitor</div>
                            <AccelerationDisplay x={acceleration.x} y={acceleration.y} />
                        </div>

                        {/* Speedometer */}
                        <div className="telemetry-card">
                            <div className="card-title">Speed</div>
                            
                            <div className="speedometer">
                                <div className="speed-display" key={speed}>
                                    {speed.toFixed(1)}
                                </div>
                                <div className="speed-unit">MPH</div>
                                <div className="max-speed-indicator">
                                    MAX: <span className="max-speed-value">{maxSpeed.toFixed(1)}</span> MPH
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Temperature Indicators */}
                    <div className="telemetry-card">
                        <div className="card-title">Temperature</div>
                        <div className="temperature-indicators">
                            <div className="temp-indicator">
                                <div className="temp-label">Temperature 1</div>
                                <div className="temp-value">{temp1.toFixed(1)}°C</div>
                                <div className="temp-conversion">{(temp1 * 9/5 + 32).toFixed(1)}°F</div>
                            </div>
                            <div className="temp-indicator">
                                <div className="temp-label">Temperature 2</div>
                                <div className="temp-value">{temp2.toFixed(1)}°C</div>
                                <div className="temp-conversion">{(temp2 * 9/5 + 32).toFixed(1)}°F</div>
                            </div>
                        </div>
                    </div>

                    {/* Lap Times */}
                    <div className="lap-times-section">
                        <div className="telemetry-card">
                            <div className="card-title">Lap Times</div>
                            {laps.length === 0 ? (
                                <div className="no-data">Waiting for lap data...</div>
                            ) : (
                                <div className="lap-cards-container">
                                    {laps.map((lap, index) => {
                                        const delta = fastestLap ? lap.time - fastestLap : 0;
                                        return (
                                            <div 
                                                key={lap.timestamp}
                                                className={`lap-card ${lap.time === fastestLap ? 'fastest' : ''}`}
                                            >
                                                <div className="lap-number">
                                                    Lap {lap.number}
                                                    {lap.time === fastestLap && ' • FASTEST'}
                                                </div>
                                                <div className="lap-time">
                                                    {formatLapTime(lap.time)}
                                                </div>
                                                {delta !== 0 && (
                                                    <div className={`lap-delta ${delta > 0 ? 'positive' : 'negative'}`}>
                                                        {delta > 0 ? '+' : ''}{delta.toFixed(3)}s
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Position Map */}
                    <div className="map-section">
                        <div className="card-title">Track Position</div>
                        {positionData.length === 0 ? (
                            <div className="no-data">Waiting for GPS data...</div>
                        ) : (
                            <div id="positionMap"></div>
                        )}
                    </div>
                </div>
            );
        }

        function AccelerationDisplay({ x, y }) {
            // Map acceleration (-1 to 1) to position in container
            // x: left (-) to right (+)
            // y: back (-) to forward (+)
            const containerSize = 100; // percentage
            const dotLeft = 50 + (x * 40); // Center at 50%, scale by 40%
            const dotTop = 50 - (y * 40);  // Invert y for screen coordinates

            // Generate grid lines at 25%, 50%, 75%
            const gridPositions = [25, 50, 75];
            const gridValues = [-0.5, 0, 0.5]; // G-force values

            return (
                <div className="acceleration-container">
                    <div className="acceleration-grid">
                        {/* Vertical grid lines */}
                        {gridPositions.map((pos, idx) => (
                            <div 
                                key={`v-${pos}`}
                                className={`acceleration-grid-line vertical ${pos === 50 ? 'center' : ''}`}
                                style={{ left: `${pos}%` }}
                            />
                        ))}
                        {/* Horizontal grid lines */}
                        {gridPositions.map((pos, idx) => (
                            <div 
                                key={`h-${pos}`}
                                className={`acceleration-grid-line horizontal ${pos === 50 ? 'center' : ''}`}
                                style={{ top: `${pos}%` }}
                            />
                        ))}
                        
                        {/* Value labels on axes */}
                        {/* Top values (forward) */}
                        <div className="acceleration-value-label" style={{ left: '25%', top: '5px', transform: 'translateX(-50%)' }}>0.5g</div>
                        <div className="acceleration-value-label" style={{ left: '75%', top: '5px', transform: 'translateX(-50%)' }}>-0.5g</div>
                        
                        {/* Bottom values (back) */}
                        <div className="acceleration-value-label" style={{ left: '25%', bottom: '5px', transform: 'translateX(-50%)' }}>-0.5g</div>
                        <div className="acceleration-value-label" style={{ left: '75%', bottom: '5px', transform: 'translateX(-50%)' }}>0.5g</div>
                        
                        {/* Left values */}
                        <div className="acceleration-value-label" style={{ left: '5px', top: '25%', transform: 'translateY(-50%)' }}>0.5g</div>
                        <div className="acceleration-value-label" style={{ left: '5px', top: '75%', transform: 'translateY(-50%)' }}>-0.5g</div>
                        
                        {/* Right values */}
                        <div className="acceleration-value-label" style={{ right: '5px', top: '25%', transform: 'translateY(-50%)' }}>-0.5g</div>
                        <div className="acceleration-value-label" style={{ right: '5px', top: '75%', transform: 'translateY(-50%)' }}>0.5g</div>
                    </div>
                    
                    <div className="acceleration-label forward">Forward</div>
                    <div className="acceleration-label back">Back</div>
                    <div className="acceleration-label left">Left</div>
                    <div className="acceleration-label right">Right</div>
                    <div 
                        className="acceleration-dot"
                        style={{
                            left: `${dotLeft}%`,
                            top: `${dotTop}%`,
                            transform: 'translate(-50%, -50%)'
                        }}
                    ></div>
                </div>
            );
        }

        function formatLapTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(3);
            return `${mins}:${secs.padStart(6, '0')}`;
        }

        ReactDOM.render(<OpenRCCrewChief />, document.getElementById('root'));


        // ─── Log Analyzer Component ────────────────────────────────────────────

        const PLOT_TABS = [
            { id: 'accel',  label: 'Acceleration' },
            { id: 'gyro',   label: 'Rotation Rates' },
            { id: 'speed',  label: 'Speed' },
            { id: 'temp',   label: 'Temperature' },
            { id: 'pwm',    label: 'PWM Channels' },
            { id: 'map',    label: 'GPS Track' },
        ];

        const CHART_COLORS = {
            x:     '#00D4FF',
            y:     '#FFD700',
            z:     '#FF6B35',
            total: '#00FF41',
            ch1:   '#E10600',
            ch2:   '#00D4FF',
            ch3:   '#FFD700',
            t1:    '#FF6B35',
            t2:    '#00FF41',
        };

        function makeDataset(label, data, colorKey, hidden) {
            const c = CHART_COLORS[colorKey] || '#ffffff';
            return {
                label,
                data,
                borderColor: c,
                backgroundColor: c + '22',
                borderWidth: 1.5,
                pointRadius: 0,
                tension: 0.3,
                hidden: !!hidden,
            };
        }

        function buildChartOptions(yLabel, tMin, tMax, allPoints) {
            const visibleY = allPoints
                .filter(pt => pt.x >= tMin && pt.x <= tMax)
                .map(pt => pt.y);
            let yMin, yMax;
            if (visibleY.length > 0) {
                const rawMin = Math.min(...visibleY);
                const rawMax = Math.max(...visibleY);
                const pad = (rawMax - rawMin) * 0.08 || Math.abs(rawMax) * 0.05 || 0.1;
                yMin = rawMin - pad;
                yMax = rawMax + pad;
            }
            return {
                responsive: true,
                animation: false,
                parsing: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        labels: { color: '#E8E8E8', font: { family: 'Rajdhani', size: 13 }, boxWidth: 14 }
                    },
                    tooltip: {
                        backgroundColor: '#1E1E1E', borderColor: '#2D2D2D', borderWidth: 1,
                        titleColor: '#FFD700', bodyColor: '#E8E8E8',
                        titleFont: { family: 'Orbitron', size: 11 }, bodyFont: { family: 'Rajdhani', size: 13 },
                        callbacks: { title: (items) => `t = ${items[0].parsed.x.toFixed(2)} s` }
                    }
                },
                scales: {
                    x: {
                        type: 'linear', min: tMin, max: tMax,
                        ticks: { color: '#E8E8E8', font: { family: 'Rajdhani', size: 11 }, maxTicksLimit: 14, callback: (v) => v.toFixed(1) + 's' },
                        grid: { color: 'rgba(255,255,255,0.06)' },
                        title: { display: true, text: 'Time (s)', color: '#FFD700', font: { family: 'Rajdhani', size: 13 } },
                    },
                    y: {
                        type: 'linear', min: yMin, max: yMax,
                        ticks: { color: '#E8E8E8', font: { family: 'Rajdhani', size: 11 } },
                        grid: { color: 'rgba(255,255,255,0.06)' },
                        title: { display: true, text: yLabel, color: '#FFD700', font: { family: 'Rajdhani', size: 13 } },
                    },
                },
            };
        }

        // (chart options built dynamically in buildChartOptions above)

        function LogChart({ id, datasets, yLabel, tMin, tMax }) {
            const canvasRef = React.useRef(null);
            const chartRef  = React.useRef(null);

            React.useEffect(() => {
                if (!canvasRef.current || datasets.length === 0) return;
                if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

                // All points across visible (non-hidden) datasets for y-range
                const allPoints = datasets.filter(ds => !ds.hidden).flatMap(ds => ds.data);

                chartRef.current = new Chart(canvasRef.current, {
                    type: 'line',
                    data: { datasets },
                    options: buildChartOptions(yLabel, tMin, tMax, allPoints),
                });
                return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
            }, [datasets, yLabel, tMin, tMax]);

            return (
                <div className="plot-canvas-wrap">
                    <canvas ref={canvasRef} height={340}></canvas>
                </div>
            );
        }

        function LogMap({ rows }) {
            const mapDivRef = React.useRef(null);
            const mapRef    = React.useRef(null);

            const validRows = rows.filter(r => r.GPSValid === 1 && (r.Latitude !== 0 || r.Longitude !== 0));

            React.useEffect(() => {
                if (!mapDivRef.current || validRows.length === 0) return;

                if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }

                const map = L.map(mapDivRef.current).setView(
                    [validRows[0].Latitude, validRows[0].Longitude], 17
                );
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors', maxZoom: 19
                }).addTo(map);

                const coords = validRows.map(r => [r.Latitude, r.Longitude]);
                L.polyline(coords, { color: '#00FF41', weight: 3, opacity: 0.85 }).addTo(map);

                // Start marker
                L.circleMarker(coords[0], {
                    radius: 7, fillColor: '#00FF41', color: '#FFD700',
                    weight: 2, opacity: 1, fillOpacity: 1
                }).bindTooltip('Start').addTo(map);

                // End / current marker
                L.circleMarker(coords[coords.length - 1], {
                    radius: 7, fillColor: '#E10600', color: '#FFD700',
                    weight: 2, opacity: 1, fillOpacity: 1
                }).bindTooltip('End').addTo(map);

                mapRef.current = map;
                return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
            }, [validRows.length]);

            if (validRows.length === 0) {
                return <div className="log-empty"><span>📡</span>No valid GPS data in this log file.</div>;
            }

            return (
                <div>
                    <div style={{ fontFamily:'Rajdhani', fontSize:'0.85rem', color:'var(--neon-green)', marginBottom:'10px', letterSpacing:'1px' }}>
                        {validRows.length} GPS points &nbsp;|&nbsp;
                        ▶ <span style={{color:'#00FF41'}}>Start</span> &nbsp;
                        ■ <span style={{color:'#E10600'}}>End</span>
                    </div>
                    <div ref={mapDivRef} className="log-map-container" style={{minHeight:'420px'}}></div>
                </div>
            );
        }

        function LogAnalyzer() {
            const [rows,        setRows]        = React.useState([]);
            const [fileName,    setFileName]    = React.useState('');
            const [activeTab,   setActiveTab]   = React.useState('accel');
            const [tMin,        setTMin]        = React.useState(0);
            const [tMax,        setTMax]        = React.useState(Infinity);
            const [tMinInput,   setTMinInput]   = React.useState('');
            const [tMaxInput,   setTMaxInput]   = React.useState('');
            const fileInputRef  = React.useRef(null);

            const parseCSV = (text) => {
                const lines = text.trim().split('\n').filter(l => l.trim());
                if (lines.length < 2) return [];
                const headers = lines[0].split(',').map(h => h.trim());
                return lines.slice(1).map(line => {
                    const vals = line.split(',');
                    const obj = {};
                    headers.forEach((h, i) => {
                        const v = vals[i] !== undefined ? vals[i].trim() : '';
                        obj[h] = isNaN(v) || v === '' ? v : parseFloat(v);
                    });
                    return obj;
                });
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setFileName(file.name);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const parsed = parseCSV(ev.target.result);
                    if (parsed.length === 0) { alert('Could not parse log file. Make sure it is a CSV with headers.'); return; }
                    // Normalize timestamp to seconds from start
                    const t0 = parsed[0].Timestamp;
                    parsed.forEach(r => { r._t = (r.Timestamp - t0) / 1000; });
                    // Compute total accel and total gyro
                    parsed.forEach(r => {
                        r._accelTotal = Math.sqrt(r.AccelX**2 + r.AccelY**2 + r.AccelZ**2);
                        r._gyroTotal  = Math.sqrt(r.GyroX**2  + r.GyroY**2  + r.GyroZ**2);
                    });
                    setRows(parsed);
                    const tEnd = parsed[parsed.length - 1]._t;
                    setTMin(0);
                    setTMax(tEnd);
                    setTMinInput('0');
                    setTMaxInput(tEnd.toFixed(1));
                    setActiveTab('accel');
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const applyTimeRange = () => {
                const lo = parseFloat(tMinInput);
                const hi = parseFloat(tMaxInput);
                if (!isNaN(lo)) setTMin(lo);
                if (!isNaN(hi)) setTMax(hi);
            };

            const resetTimeRange = () => {
                if (rows.length === 0) return;
                const t0 = 0;
                const tEnd = rows[rows.length - 1]._t;
                setTMin(t0); setTMax(tEnd);
                setTMinInput('0'); setTMaxInput(tEnd.toFixed(1));
            };

            // Build datasets
            const pt = (r, yKey) => ({ x: r._t, y: r[yKey] });

            const accelDatasets = rows.length ? [
                makeDataset('X (m/s²)',     rows.map(r => pt(r,'AccelX')),     'x'),
                makeDataset('Y (m/s²)',     rows.map(r => pt(r,'AccelY')),     'y'),
                makeDataset('Z (m/s²)',     rows.map(r => pt(r,'AccelZ')),     'z'),
                makeDataset('Total (m/s²)', rows.map(r => ({ x:r._t, y:r._accelTotal })), 'total'),
            ] : [];

            const gyroDatasets = rows.length ? [
                makeDataset('X (rad/s)',    rows.map(r => pt(r,'GyroX')),     'x'),
                makeDataset('Y (rad/s)',    rows.map(r => pt(r,'GyroY')),     'y'),
                makeDataset('Z (rad/s)',    rows.map(r => pt(r,'GyroZ')),     'z'),
                makeDataset('Total (rad/s)',rows.map(r => ({ x:r._t, y:r._gyroTotal })), 'total'),
            ] : [];

            const speedDatasets = rows.length ? [
                makeDataset('Speed (km/h)', rows.map(r => pt(r,'Speed')), 'total'),
            ] : [];

            const tempDatasets = rows.length ? [
                makeDataset('Temp 1 (°C)', rows.map(r => pt(r,'Temp1')), 't1'),
                makeDataset('Temp 2 (°C)', rows.map(r => pt(r,'Temp2')), 't2'),
            ] : [];

            const pwmDatasets = rows.length ? [
                makeDataset('CH 1', rows.map(r => pt(r,'PWM_Ch1')), 'ch1'),
                makeDataset('CH 2', rows.map(r => pt(r,'PWM_Ch2')), 'ch2'),
                makeDataset('CH 3', rows.map(r => pt(r,'PWM_Ch3')), 'ch3'),
            ] : [];

            // Stats
            const duration = rows.length ? rows[rows.length-1]._t.toFixed(1) : '—';
            const maxSpeedLog = rows.length ? Math.max(...rows.map(r => r.Speed)).toFixed(2) : '—';
            const maxAccel = rows.length ? Math.max(...rows.map(r => r._accelTotal)).toFixed(2) : '—';
            const gpsPoints = rows.length ? rows.filter(r => r.GPSValid === 1).length : 0;

            return (
                <div className="log-analyzer-section">
                    <div className="log-analyzer-header">
                        <div className="log-analyzer-title">Log Analyzer</div>
                        <input
                            ref={fileInputRef}
                            type="file"
                            accept=".csv,.txt,.log"
                            style={{ display:'none' }}
                            onChange={handleFile}
                        />
                        <button className="log-upload-btn" onClick={() => fileInputRef.current.click()}>
                            📂 Load Log File
                        </button>
                        {fileName && <span className="log-file-info">▶ {fileName}</span>}
                    </div>

                    {rows.length === 0 ? (
                        <div className="log-empty">
                            <span>📋</span>
                            Load a CSV log file from Open RC Spotter to view telemetry plots.
                        </div>
                    ) : (
                        <>
                            {/* Stats bar */}
                            <div className="log-stats-bar">
                                <div className="log-stat">
                                    <div className="log-stat-label">Samples</div>
                                    <div className="log-stat-value">{rows.length}</div>
                                </div>
                                <div className="log-stat">
                                    <div className="log-stat-label">Duration</div>
                                    <div className="log-stat-value">{duration} s</div>
                                </div>
                                <div className="log-stat">
                                    <div className="log-stat-label">Max Speed</div>
                                    <div className="log-stat-value">{maxSpeedLog} km/h</div>
                                </div>
                                <div className="log-stat">
                                    <div className="log-stat-label">Peak Accel</div>
                                    <div className="log-stat-value">{maxAccel} m/s²</div>
                                </div>
                                <div className="log-stat">
                                    <div className="log-stat-label">GPS Points</div>
                                    <div className="log-stat-value">{gpsPoints}</div>
                                </div>
                            </div>

                            {/* Time range filter */}
                            <div className="time-range-controls">
                                <span className="time-range-label">Time Range:</span>
                                <input
                                    className="time-range-input"
                                    type="number"
                                    value={tMinInput}
                                    onChange={e => setTMinInput(e.target.value)}
                                    placeholder="Start (s)"
                                />
                                <span style={{color:'var(--off-white)'}}>→</span>
                                <input
                                    className="time-range-input"
                                    type="number"
                                    value={tMaxInput}
                                    onChange={e => setTMaxInput(e.target.value)}
                                    placeholder="End (s)"
                                />
                                <button className="time-range-btn" onClick={applyTimeRange}>Apply</button>
                                <button className="time-range-btn" onClick={resetTimeRange}>Reset</button>
                            </div>

                            {/* Tabs */}
                            <div className="plot-tabs">
                                {PLOT_TABS.map(tab => (
                                    <button
                                        key={tab.id}
                                        className={`plot-tab ${activeTab === tab.id ? 'active' : ''}`}
                                        onClick={() => setActiveTab(tab.id)}
                                    >
                                        {tab.label}
                                    </button>
                                ))}
                            </div>

                            {/* Plot area */}
                            <div className="plot-container">
                                {activeTab === 'accel' && (
                                    <LogChart id="accel" datasets={accelDatasets} yLabel="Acceleration (m/s²)" tMin={tMin} tMax={tMax} />
                                )}
                                {activeTab === 'gyro' && (
                                    <LogChart id="gyro" datasets={gyroDatasets} yLabel="Rotation Rate (rad/s)" tMin={tMin} tMax={tMax} />
                                )}
                                {activeTab === 'speed' && (
                                    <LogChart id="speed" datasets={speedDatasets} yLabel="Speed (km/h)" tMin={tMin} tMax={tMax} />
                                )}
                                {activeTab === 'temp' && (
                                    <LogChart id="temp" datasets={tempDatasets} yLabel="Temperature (°C)" tMin={tMin} tMax={tMax} />
                                )}
                                {activeTab === 'pwm' && (
                                    <LogChart id="pwm" datasets={pwmDatasets} yLabel="PWM Value" tMin={tMin} tMax={tMax} />
                                )}
                                {activeTab === 'map' && (
                                    <LogMap rows={rows} />
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        // Inject Log Analyzer into existing app after render
        const logRoot = document.createElement('div');
        logRoot.id = 'log-analyzer-root';
        document.getElementById('root').appendChild(logRoot);
        // Wait for React root to mount, then append LogAnalyzer inside the app container
        // We use a second ReactDOM.render on a sibling div appended to body
        const laMount = document.createElement('div');
        laMount.style.cssText = 'max-width:1800px;margin:0 auto;padding:0 20px 40px;position:relative;z-index:2;';
        document.body.appendChild(laMount);
        ReactDOM.render(<LogAnalyzer />, laMount);
    </script>
</body>
</html>
